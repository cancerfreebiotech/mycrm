name = "mycrm-inbound-email"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# MYCRM_WEBHOOK_URL — set per-environment via dashboard or `wrangler secret put`
# INBOUND_PARSE_SECRET — set via `wrangler secret put INBOUND_PARSE_SECRET`
#
# Example non-secret default for production:
[vars]
MYCRM_WEBHOOK_URL = "https://crm.cancerfree.io/api/inbound-email"

# Email Routing binding: bind this Worker to the bcc.cancerfree.io zone's
# inbox@ address via the dashboard (Email → Email Routing → Routes →
# Custom address → Send to a Worker → mycrm-inbound-email).
