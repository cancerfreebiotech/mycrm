title: myCRM 說明書
description: CancerFree Biotech 內部 CRM 系統使用說明
remote_theme: just-the-docs/just-the-docs@v0.10.0

plugins:
  - jekyll-remote-theme

url: https://cancerfreebiotech.github.io
baseurl: /mycrm

# 搜尋功能
search_enabled: true

# 頁尾
footer_content: "© CancerFree Biotech"

# 不顯示的檔案
exclude:
  - SUMMARY.md
  - PRD.md

# 關掉頁面內容的 Liquid 解析（避免文件中 {{{unsubscribe}}} 等 placeholder 被誤判）
defaults:
  - scope:
      path: ""
    values:
      render_with_liquid: false
