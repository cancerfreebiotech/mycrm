<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{subject}}</title>
</head>
<body style="margin:0;padding:0;background-color:#F5F5F5;">
  <div style='background-color:#F5F5F5;color:#262626;font-family:"Helvetica Neue","Arial Nova","Nimbus Sans",Arial,sans-serif;font-size:16px;font-weight:400;letter-spacing:0.15008px;line-height:1.5;margin:0;padding:32px 0;min-height:100%;width:100%'>
    <table align="center" width="100%" style="margin:0 auto;max-width:600px;background-color:#FFFFFF" role="presentation" cellspacing="0" cellpadding="0" border="0">
      <tbody>
        <tr style="width:100%">
          <td>

            <!-- ==================== HEADER ==================== -->
            <div style="padding:16px 24px 16px 24px">
              <table align="center" width="100%" cellpadding="0" border="0" style="table-layout:fixed;border-collapse:collapse">
                <tbody style="width:100%">
                  <tr style="width:100%">
                    <td style="box-sizing:content-box;vertical-align:middle;padding-left:0;padding-right:10.66px">
                      <div style="padding:4px 12px 0px 24px">
                        <a href="https://cancerfree.io" style="text-decoration:none" target="_blank">
                          <img alt="CancerFree Biotech" src="{{logo_url}}" style="outline:none;border:none;text-decoration:none;vertical-align:middle;display:inline-block;max-width:100%"/>
                        </a>
                      </div>
                    </td>
                    <td style="box-sizing:content-box;vertical-align:middle;padding:0 5.33px">
                      <div style="font-size:19px;font-weight:bold;text-align:center;padding:16px 12px 16px 24px">
                        <p style="margin:0">{{month_label}}</p>
                      </div>
                    </td>
                    <td style="box-sizing:content-box;vertical-align:middle;padding-left:10.66px;padding-right:0">
                      <div style="font-size:18px;font-weight:bold;text-align:right;padding:16px 24px 16px 24px">
                        <p style="margin:0">
                          <a href="{{substack_url}}" target="_blank" style="color:#0D9488;text-decoration:none">New update</a>
                        </p>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            <div style="padding:16px 0"><hr style="width:100%;border:none;border-top:1px solid #CCCCCC;margin:0"/></div>

            <!-- ==================== INTRO (This month's summary) ==================== -->
            <div style="font-size:16px;padding:16px 24px 16px 24px">
              <h2 style="font-size:1.25rem;font-weight:bold;padding-left:12px;border-left:7px solid #0D9488;line-height:1.4;margin:24px 0">
                {{upcoming_title}}
              </h2>
            </div>
            <div style="font-weight:normal;padding:16px 24px 16px 24px">
              {{intro_html}}
            </div>

            <!-- ==================== UPCOMING SECTIONS ==================== -->
            {{upcoming_blocks}}

            <!-- ==================== DIVIDER ==================== -->
            <div style="padding:16px 0"><hr style="width:100%;border:none;border-top:1px solid #CCCCCC;margin:0"/></div>

            <!-- ==================== RECAP ==================== -->
            <div style="font-size:16px;padding:16px 24px 16px 24px">
              <h2 style="font-size:1.25rem;font-weight:bold;padding-left:12px;border-left:7px solid #0D9488;line-height:1.4;margin:24px 0">
                {{recap_title}}
              </h2>
            </div>

            {{recap_blocks}}

            <!-- ==================== FOOTER ==================== -->
            <div style="font-size:16px;padding:16px 24px 16px 24px">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#ffffff;margin:0;padding:0">

                <!-- Social icons -->
                <tr>
                  <td align="center" style="padding:24px 16px 8px 16px">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td align="center" style="padding:0 6px">
                          <a href="{{facebook_url}}" target="_blank">
                            <img src="https://assets.mlcdn.com/ml/images/icons/default/rounded_corners/black/facebook.png" width="20" height="20" border="0" alt="Facebook" style="display:block;border:0;outline:none;text-decoration:none"/>
                          </a>
                        </td>
                        <td align="center" style="padding:0 6px">
                          <a href="{{linkedin_url}}" target="_blank">
                            <img src="https://assets.mlcdn.com/ml/images/icons/default/rounded_corners/black/linkedin.png" width="20" height="20" border="0" alt="LinkedIn" style="display:block;border:0;outline:none;text-decoration:none"/>
                          </a>
                        </td>
                        <td align="center" style="padding:0 6px">
                          <a href="{{website_url}}" target="_blank">
                            <img src="https://assets.mlcdn.com/ml/images/icons/default/rounded_corners/black/website.png" width="20" height="20" border="0" alt="Website" style="display:block;border:0;outline:none;text-decoration:none"/>
                          </a>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>

                <!-- Company -->
                <tr>
                  <td align="center" style="padding:8px 16px 0 16px;font-family:Arial,Helvetica,sans-serif;color:#111111">
                    <p style="margin:0;font-size:16px;line-height:22px;font-weight:700">CancerFree Biotech</p>
                  </td>
                </tr>

                <!-- Address -->
                <tr>
                  <td align="center" style="padding:8px 16px 0 16px;font-family:Arial,Helvetica,sans-serif;color:#111111">
                    <p style="margin:0;font-size:14px;line-height:22px">3F-2, No. 56, Lane 258, Ruiguang Road, Neihu District, Taipei City, Taiwan</p>
                  </td>
                </tr>

                <!-- Unsubscribe -->
                <tr>
                  <td align="center" style="padding:12px 16px 24px 16px;font-family:Arial,Helvetica,sans-serif;color:#111111">
                    <p style="margin:0;font-size:12px;line-height:20px;color:#9ca3af">
                      <a href="{{optout_url}}" target="_blank" style="color:#9ca3af;text-decoration:underline">Unsubscribe</a>
                    </p>
                  </td>
                </tr>

              </table>
            </div>

          </td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
