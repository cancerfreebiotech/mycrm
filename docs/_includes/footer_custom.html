<button id="theme-toggle" title="切換深色/淺色模式" aria-label="Toggle dark mode">🌙</button>

<script>
  (function() {
    var btn = document.getElementById('theme-toggle');
    var isDark = localStorage.getItem('docs-theme') === 'dark';

    function applyTheme(dark) {
      if (dark) {
        document.body.classList.add('dark-mode');
        btn.textContent = '☀️';
        localStorage.setItem('docs-theme', 'dark');
      } else {
        document.body.classList.remove('dark-mode');
        btn.textContent = '🌙';
        localStorage.setItem('docs-theme', 'light');
      }
    }

    // Apply on load
    applyTheme(isDark);

    // Toggle on click
    btn.addEventListener('click', function() {
      isDark = !isDark;
      applyTheme(isDark);
    });
  })();
</script>
