<style>
  /* Dark mode CSS variable overrides */
  body.dark-mode {
    --body-background-color: #1a1a2e !important;
    --sidebar-color: #16213e !important;
    --body-text-color: #c9d1d9 !important;
    --body-heading-color: #f0f6fc !important;
    --nav-child-link-color: #c9d1d9 !important;
    --link-color: #818cf8 !important;
    --border-color: #30363d !important;
    --table-background-color: #16213e !important;
    --search-background-color: #16213e !important;
    --search-result-preview-color: #8b949e !important;
    --base-button-color: #21262d !important;
    --btn-primary-color: #f0f6fc !important;
    --code-background-color: #161b22 !important;
    --feedback-color: inherit !important;
    color-scheme: dark;
  }
  body.dark-mode .main-content code,
  body.dark-mode .main-content pre {
    background-color: #161b22 !important;
    color: #c9d1d9 !important;
  }
  body.dark-mode table {
    color: #c9d1d9 !important;
  }

  /* Toggle button */
  #theme-toggle {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    z-index: 1000;
    background: var(--body-background-color, #fff);
    border: 1px solid var(--border-color, #e5e7eb);
    border-radius: 9999px;
    padding: 0.5rem 0.75rem;
    cursor: pointer;
    font-size: 1rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    transition: background 0.2s, border-color 0.2s;
    line-height: 1;
  }
  #theme-toggle:hover {
    opacity: 0.85;
  }
</style>

<script>
  // Apply saved theme before paint (prevent flash)
  (function() {
    if (localStorage.getItem('docs-theme') === 'dark') {
      document.addEventListener('DOMContentLoaded', function() {
        document.body.classList.add('dark-mode');
      });
    }
  })();
</script>
